<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เมนูอาหาร - Whisky Bistro</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap" rel="stylesheet">
  
  <!-- โหลดคลังไอคอน Google Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body, button, input, select, textarea { 
      font-family: 'Noto Sans Thai', sans-serif; 
    }
    body { 
      padding: 10px; 
      background-color: #fbf9f6; /* โทนสีลินินอุ่นนุ่มสว่างพิเศษ */
      color: #4e463f; /* สีน้ำตาลเทาเนื้อนุ่มสบายตา */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .app-card {
      width: 100%;
      max-width: 580px;
      background-color: #ffffff;
      border-radius: 12px; 
      box-shadow: 0 8px 32px rgba(130, 120, 110, 0.03); 
      border: 1px solid #e8e2da; 
      padding: 24px;
      box-sizing: border-box;
      margin: 15px auto;
    }

    .lang-switch-container {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .lang-btn {
      width: auto !important;
      display: inline-block;
      padding: 6px 14px !important;
      margin-bottom: 0 !important;
      background-color: #f2ede6; 
      color: #7a7065;
      border: none;
      border-radius: 6px; 
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s ease;
    }
    .lang-btn.active {
      background-color: #fbe6e5; 
      color: #8a574e; 
    }
    .lang-btn.active:hover {
      background-color: #f7d4cf;
      color: #7a463d;
    }
    .lang-btn:not(.active):hover {
      background-color: #e8e2da;
    }

    #title-heading {
      font-size: 24px;
      font-weight: 800;
      color: #433c37; 
      margin-top: 5px;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: -0.5px;
      display: flex;
      flex-direction: column; 
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .center-logo {
      display: block;
      margin-left: auto;
      margin-right: auto;
      max-width: 90px; 
      width: 30%;
      margin-bottom: 15px;
      opacity: 0.95;
    }

    /* Container ของแต่ละหน้า */
    .step-page {
      display: none;
    }
    .step-page.active {
      display: block;
    }

    /* ส่วนหัวซุ้มอาหาร */
    .stall-header-new {
      margin-bottom: 20px;
    }
    .stall-header-top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 12px;
    }
    .stall-header-title-centered {
      font-size: 21px;
      font-weight: 800;
      color: #433c37; 
      text-align: center;
      margin: 10px 0 0 0;
      line-height: 1.3;
      letter-spacing: -0.5px;
      padding-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-close-stall {
      background-color: #fdf0ee;
      color: #ba7c72;
      border: none;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      box-sizing: border-box;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .btn-close-stall:hover {
      background-color: #f9e2dd;
      color: #a35d52;
    }

    /* ระบบกริด 6 ซุ้มอาหาร */
    .stall-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stall-btn {
      background-color: #ffffff;
      border: 1px solid #e8e2da; 
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      cursor: pointer;
      transition: all 0.2s ease;
      aspect-ratio: 1 / 1;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
    }
    .stall-btn:hover {
      border-color: #c9beb0; 
      background-color: #faf6f0;
    }
    .stall-btn-img {
      width: 100%;
      height: 60%;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
      background-color: #faf9f6;
    }
    .stall-btn-title {
      font-size: 12px; 
      font-weight: 800;
      color: #4e463f; 
      line-height: 1.3;
      text-align: center;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .home-hint-box {
      text-align: center; 
      font-size: 14px; 
      color: #466e51; 
      font-weight: 800; 
      margin-bottom: 20px; 
      background: #ffffff; 
      padding: 14px; 
      border-radius: 8px; 
      border: 1px solid #c2e3cc; 
      line-height: 1.4;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* สไลด์รูปภาพเมนู */
    .menu-carousel {
      width: 100%;
      margin-bottom: 18px;
      position: relative;
    }
    .carousel-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      gap: 12px;
      border-radius: 8px;
      padding-bottom: 4px;
    }
    .carousel-track::-webkit-scrollbar {
      display: none; 
    }
    .carousel-item {
      flex: 0 0 100%;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .carousel-img {
      width: 100%;
      max-width: 100%; 
      aspect-ratio: 1 / 1.414; 
      object-fit: contain;
      background-color: #faf9f6;
      border-radius: 8px;
      border: none;
      display: block;
      margin: 0 auto;
      cursor: zoom-in; 
    }
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #eee9e2; 
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .dot.active {
      background-color: #a8d6b4; 
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(255, 255, 255, 0.85);
      border: 1px solid #e8e2da;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: none; 
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s ease;
      color: #7a7065;
      padding: 0;
      box-shadow: 0 2px 8px rgba(130, 120, 110, 0.08);
    }
    .carousel-btn:hover {
      background-color: #ffffff;
      color: #433c37;
    }
    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }

    /* ตกแต่งกล่องรายการเมนูแนะนำ */
    .recommend-list-container {
      background: #ffffff;
      border: 1px solid #e8e2da;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .recommend-title {
      font-weight: 800;
      font-size: 14px;
      color: #7a7065;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid #eee9e2;
      padding-bottom: 10px;
    }
    .recommend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #faf9f6;
      font-size: 14px;
      color: #4e463f;
      font-weight: 700;
    }
    .recommend-item:last-child {
      border-bottom: none;
    }
    .recommend-number {
      background-color: #edf7f1;
      color: #466e51;
      font-size: 11px;
      font-weight: 800;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* กล่องข้อมูลโทรติดต่อสั่งอาหารล่วงหน้า */
    .contact-card-container {
      background: #fdfaf7;
      border: 1px dashed #dcd4cb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-sizing: border-box;
    }
    .contact-card-title {
      font-size: 13px;
      font-weight: 800;
      color: #7a7065;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-call-stall {
      background-color: #fbe6e5;
      color: #8a574e;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      width: 100%;
      box-sizing: border-box;
      transition: all 0.15s ease;
    }
    .btn-call-stall:hover {
      background-color: #f7d4cf;
      color: #7a463d;
    }

    /* ปุ่มกลับหน้าหลัก */
    .btn-back-home {
      background-color: #f2ede6;
      color: #61584f;
      border: 1px solid #d3c9be;
      padding: 12px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-back-home:hover {
      background-color: #e5ddd3;
      color: #4e463f;
    }

    @media (min-width: 769px) {
      .stall-btn {
        padding: 0 !important;
        border-radius: 12px;
        overflow: hidden;
      }
      .stall-btn-img {
        width: 100% !important;
        height: 75% !important;
        border-radius: 8px 8px 0 0 !important;
        margin-bottom: 0 !important;
        object-fit: cover !important;
      }
      .stall-btn-title {
        height: 25% !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 8px 12px !important;
        box-sizing: border-box !important;
        font-size: 13px !important; 
        font-weight: 800 !important;
        background-color: #ffffff;
      }
      .carousel-btn {
        display: flex; 
      }
    }

    /* ลิงก์รูปภาพขยายใหญ่ (Lightbox Modal) */
    .img-modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.95);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .img-modal-content {
      margin: auto;
      display: block;
      max-width: 95%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
      transition: all 0.2s ease;
      cursor: zoom-in;
    }
    .img-modal-content.zoomed {
      max-width: 180%;
      max-height: none;
      cursor: zoom-out;
    }
    .img-modal-close {
      position: absolute;
      top: 15px;
      right: 25px;
      color: #f1f1f1;
      font-size: 40px;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
      user-select: none;
      z-index: 10000;
    }
    .img-modal-close:hover {
      color: #bbb;
    }
    #img-modal-caption {
      margin: 15px auto;
      display: block;
      width: 80%;
      max-width: 700px;
      text-align: center;
      color: #ccc;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="app-card">
    <!-- ตัวสลับภาษา -->
    <div class="lang-switch-container">
      <button id="lang-th-btn" class="lang-btn active" onclick="switchLanguage('th')">🇹🇭 ภาษาไทย</button>
      <button id="lang-en-btn" class="lang-btn" onclick="switchLanguage('en')">🇬🇧 English</button>
      <button id="lang-ja-btn" class="lang-btn" onclick="switchLanguage('ja')">🇯🇵 日本語</button>
    </div>

    <img src="https://drive.google.com/thumbnail?id=1GaSEE2KYAFK07ViNwkLKvM5YD3ZYtcc8&sz=w1000" alt="Whisky_Bistro_Logo" class="center-logo">
    <h2 id="title-heading">เมนูอาหาร<br>Whisky Bistro Menu</h2>

    <!-- ────────────────────────────────────────────────────────
         หน้าหลักเมนู 6 ซุ้ม (Step 0)
         ──────────────────────────────────────────────────────── -->
    <div id="step-page-0" class="step-page active">
      <div id="home-hint-text" class="home-hint-box">
        <span class="material-symbols-outlined" style="color: #466e51; font-size: 20px;">lightbulb</span> 
        <span>แตะที่ซุ้มอาหารด้านล่างเพื่อเลือกดูเมนูแนะนำ</span>
      </div>

      <div class="stall-grid">
        <!-- ป้อนปุ่มกริดจาก JS อัตโนมัติ -->
      </div>
    </div>

    <!-- ────────────────────────────────────────────────────────
         หน้าแสดงข้อมูลเมนูของแต่ละซุ้มอาหาร (Step 1 - 6)
         ──────────────────────────────────────────────────────── -->
    
    <!-- หน้าโมดูลซุ้มอาหาร (แชร์โครงสร้างร่วมกันแบบไดนามิก) -->
    <div id="step-page-stall-detail" class="step-page">
      <div class="stall-header-new">
        <div class="stall-header-top-bar">
          <button class="btn-close-stall" onclick="goHome()">
            <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
          </button>
        </div>
        <h1 class="stall-header-title-centered" id="title-stall-detail">
          <span class="material-symbols-outlined" id="icon-stall-detail" style="font-size: 28px; color: #a66b62;">restaurant</span>
          <span id="text-stall-detail">-</span>
        </h1>
      </div>

      <!-- สไลด์รูปภาพ -->
      <div class="menu-carousel">
        <div class="carousel-track" id="carousel-track-detail"></div>
        <div class="carousel-dots" id="carousel-dots-detail"></div>
      </div>

      <!-- กล่องแสดงรายการเมนูแนะนำประจำซุ้ม -->
      <div class="recommend-list-container" id="recommend-list-detail">
        <!-- ข้อมูลถูกส่งมาผ่าน JS -->
      </div>

      <!-- กล่องข้อมูลการติดต่อโทรสั่งอาหารล่วงหน้าของแต่ละซุ้ม -->
      <div class="contact-card-container" id="contact-card-detail">
        <!-- ข้อมูลถูกสร้างมาผ่าน JS ตามหมายเลขซุ้มที่ระบุ -->
      </div>

      <button class="btn-back-home" onclick="goHome()">
        <span class="material-symbols-outlined">home</span>
        <span class="btn-back-text">กลับหน้าหลัก</span>
      </button>
    </div>

  </div>

  <!-- Modal สำหรับซูมขยายรูปภาพเมนู -->
  <div id="image-modal" class="img-modal" onclick="closeImageModal()">
    <span class="img-modal-close" onclick="closeImageModal()">&times;</span>
    <img class="img-modal-content" id="modal-img">
    <div id="img-modal-caption"></div>
  </div>

  <script>
    // รูปภาพหน้าสไลด์เมนู (ใช้ชุดเดียวกับโค้ดเดิมของคุณ)
    const stallMenuImages = {
      1: [
        "https://drive.google.com/thumbnail?id=1n94y6gT-U_2R_zmmBah2zhNFQbVLZSMQ&sz=w1200",
        "https://drive.google.com/thumbnail?id=16HT34R_IhZdkEUDj9JC9eb5MmqmLJoOG&sz=w1200"
      ],
      2: [
        "https://drive.google.com/thumbnail?id=13HDmTXKBxJ-2_QcNeGPCNyAXKAqM2BIw&sz=w1200",

        "https://drive.google.com/thumbnail?id=1xi8nizhPTEfeUVdMq-x4wDTg4VRtvqc8&sz=w1200"
      ],
      3: [
        "https://drive.google.com/thumbnail?id=1Daoj7KVnbTkT5Eroe_T_gj1leAWmcENq&sz=w1200"
      ],
      4: [
        "https://drive.google.com/thumbnail?id=1g05UXCXc_LRGdUPsGwlk68Xk6YLR6VCw&sz=w1200",
        "https://drive.google.com/thumbnail?id=1u3RBzINURJEDdnX4XGjahRbZm9MYfNK1&sz=w1200",
        "https://drive.google.com/thumbnail?id=1fdQMB5074YoI1EyDNUMmEp0SJO4V2_7-&sz=w1200"

      5: [

        "https://drive.google.com/thumbnail?id=1293zZq-iU-DvSIz6dpDijGK5lqQ-SiUK&sz=w1200"
      ],
      6: [

        "https://drive.google.com/thumbnail?id=1iGg48aN6ayai9BqFA-jsBt6NHj54WXVG&sz=w1200",
        "https://drive.google.com/thumbnail?id=10v_Zrkb13US-vwIustekWi4sccYwXNcs&sz=w1200",
        "https://drive.google.com/thumbnail?id=1B8O_CzGcskleVwc6loJMG5H_Z5W_f3g9&sz=w1200",
        "https://drive.google.com/thumbnail?id=1CwBqw-jO36wNoI1lSm1jg79yXKlgavCT&sz=w1200"
      ]
    };

    // รายชื่อเมนูแนะนำอิงจากข้อมูลล่าสุด
    const stallSuggestions = {
      th: {

    // แสดงหน้า
    function showPage(pageId) {
      document.querySelectorAll('.step-page').forEach(page => {
        page.classList.remove('active');
      });
      const targetPage = document.getElementById(pageId);
      if (targetPage) {
        targetPage.classList.add('active');
      }
    }

    function goHome() {
      currentSelectedStall = null;
      showPage('step-page-0');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // เปิดซุ้มอาหารและรันข้อมูลเมนูแบบไดนามิก
    function openStall(stallId) {
      currentSelectedStall = stallId;
      showPage('step-page-stall-detail');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      
      // อัปเดตข้อมูลหัวเรื่องซุ้ม
      const titlesDict = stallTitles[currentLang] || stallTitles['th'];
      const textStall = document.getElementById('text-stall-detail');
      const iconStall = document.getElementById('icon-stall-detail');
      if (textStall) textStall.innerText = titlesDict[stallId];
      if (iconStall) iconStall.innerText = stallIcons[stallId];

      // เริ่มทำงานระบบภาพสไลด์เฉพาะซุ้มที่เลือก
      initCarouselForStall(stallId);

      // แสดงลิสต์เมนูแนะนำ 10 รายการ
      renderRecommendations(stallId);

      // แสดงปุ่มและข้อมูลโทรติดต่อสั่งซื้อล่วงหน้า
      renderPhoneContact(stallId);
    }

    // จัดทำลิสต์รายการแนะนำ
    function renderRecommendations(stallId) {
      const container = document.getElementById('recommend-list-detail');
      if (!container) return;

      const dict = translations[currentLang] || translations['th'];
      const suggestions = stallSuggestions[currentLang] || stallSuggestions['th'];
      const items = suggestions[stallId] || [];

      let htmlContent = `
        <div class="recommend-title">
          <span class="material-symbols-outlined" style="color: #466e51; font-size: 18px;">featured_play_list</span>
          <span>${dict.recommend_header}</span>
        </div>
      `;

      items.forEach((item, index) => {
        htmlContent += `
          <div class="recommend-item">
            <span class="recommend-number">${index + 1}</span>
            <span>${item}</span>
          </div>
        `;
      });

      container.innerHTML = htmlContent;
    }

    // จัดวางโครงสร้างข้อมูลเบอร์โทรศัพท์ของแต่ละซุ้มแบบไดนามิก
    function renderPhoneContact(stallId) {
      const container = document.getElementById('contact-card-detail');
      if (!container) return;

      const phoneInfo = stallPhones[stallId];
      if (!phoneInfo) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'flex';

      const dict = translations[currentLang] || translations['th'];

      container.innerHTML = `
        <div class="contact-card-title">
          <span class="material-symbols-outlined" style="color: #ba7c72; font-size: 18px;">phone_in_talk</span>
          <span>${dict.call_to_order}</span>
        </div>
        <a href="tel:${phoneInfo.raw}" class="btn-call-stall">
          <span class="material-symbols-outlined" style="font-size: 20px;">call</span>
          <span>${phoneInfo.display}</span>
        </a>
      `;
    }

    // ทำงานส่วนภาพสไลด์ในหน้าย่อย
    function initCarouselForStall(stallId) {
      const track = document.getElementById('carousel-track-detail');
      const dotsContainer = document.getElementById('carousel-dots-detail');
      if (!track || !dotsContainer) return;

      const carouselContainer = track.parentElement;
      const images = stallMenuImages[stallId] || [];
      track.innerHTML = '';
      dotsContainer.innerHTML = '';
      track.scrollLeft = 0; // ย้อนกลับสไลด์ไปตำแหน่งเริ่มต้น

      images.forEach((imgUrl, idx) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-item';
        slide.innerHTML = `<img class="carousel-img" src="${imgUrl}" alt="Menu Page ${idx + 1}" onerror="this.src='https://drive.google.com/thumbnail?id=1GaSEE2KYAFK07ViNwkLKvM5YD3ZYtcc8&sz=w1000'" onclick="openImageModal('${imgUrl}', ${stallId}, ${idx + 1})">`;
        track.appendChild(slide);

        const dot = document.createElement('span');
        dot.className = `dot ${idx === 0 ? 'active' : ''}`;
        dot.addEventListener('click', () => {
          track.scrollTo({
            left: track.clientWidth * idx,
            behavior: 'smooth'
          });
        });
        dotsContainer.appendChild(dot);
      });

      // จัดการปุ่มนำทางสไลด์ซ้าย-ขวาบนหน้าจอ PC
      const prevBtnExist = carouselContainer.querySelector('.carousel-btn.prev');
      const nextBtnExist = carouselContainer.querySelector('.carousel-btn.next');
      if (prevBtnExist) prevBtnExist.remove();
      if (nextBtnExist) nextBtnExist.remove();

      if (images.length > 1) {
        const prevBtn = document.createElement('button');
        prevBtn.className = 'carousel-btn prev';
        prevBtn.setAttribute('type', 'button');
        prevBtn.innerHTML = '<span class="material-symbols-outlined">chevron_left</span>';
        prevBtn.onclick = (e) => {
          e.preventDefault();
          track.scrollBy({ left: -track.clientWidth, behavior: 'smooth' });
        };
        carouselContainer.appendChild(prevBtn);

        const nextBtn = document.createElement('button');
        nextBtn.className = 'carousel-btn next';
        nextBtn.setAttribute('type', 'button');
        nextBtn.innerHTML = '<span class="material-symbols-outlined">chevron_right</span>';
        nextBtn.onclick = (e) => {
          e.preventDefault();
          track.scrollBy({ left: track.clientWidth, behavior: 'smooth' });
        };
        carouselContainer.appendChild(nextBtn);
      }

      // ตรวจสอบ Dot ปัจจุบันขณะใช้นิ้วเลื่อนสกรอลล์จอภาพ
      track.addEventListener('scroll', () => {
        const width = track.clientWidth;
        if (width <= 0) return;
        const index = Math.round(track.scrollLeft / width);
        const dots = dotsContainer.querySelectorAll('.dot');
        dots.forEach((dot, idx) => {
          dot.classList.toggle('active', idx === index);
        });
      });
    }

    // เรนเดอร์หน้ารวมซุ้มอาหาร (Home Hub)
    function renderStallGrid() {
      try {
        const gridContainer = document.querySelector('.stall-grid');
        if (!gridContainer) return;

        gridContainer.innerHTML = '';
        const titlesDict = stallTitles[currentLang] || stallTitles['th'];

        for (let stallId = 1; stallId <= 6; stallId++) {
          const title = titlesDict[stallId];
          const imgUrl = (stallMenuImages[stallId] && stallMenuImages[stallId][0]) || 'https://drive.google.com/thumbnail?id=1GaSEE2KYAFK07ViNwkLKvM5YD3ZYtcc8&sz=w1000';

          const button = document.createElement('div');
          button.className = 'stall-btn';
          button.onclick = () => openStall(stallId);
          button.innerHTML = `
            <img class="stall-btn-img" src="${imgUrl}" alt="${title}">
            <div class="stall-btn-title" style="display: flex; align-items: center; justify-content: center; gap: 4px;">
              <span class="material-symbols-outlined" style="font-size: 20px; color: #a66b62;">${stallIcons[stallId]}</span>
              <span>${title}</span>
            </div>
          `;
          gridContainer.appendChild(button);
        }
      } catch (err) {
        console.error("Error in renderStallGrid:", err);
      }
    }

    // สลับภาษา
    function switchLanguage(lang) {
      try {
        currentLang = lang;
        const dict = translations[lang] || translations['th'];
        
        const btnTh = document.getElementById('lang-th-btn');
        const btnEn = document.getElementById('lang-en-btn');
        const btnJa = document.getElementById('lang-ja-btn');
        
        if (btnTh) btnTh.classList.toggle('active', lang === 'th');
        if (btnEn) btnEn.classList.toggle('active', lang === 'en');
        if (btnJa) btnJa.classList.toggle('active', lang === 'ja');

        const titleHeading = document.getElementById('title-heading');
        if (titleHeading) titleHeading.innerHTML = dict.title;

        const homeHintEl = document.getElementById('home-hint-text');
        if (homeHintEl) {
          homeHintEl.innerHTML = `
            <span class="material-symbols-outlined" style="color: #466e51; font-size: 20px;">lightbulb</span> 
            <span>${dict.home_hint}</span>
          `;
        }

        // แปลคำข้อความในปุ่มกลับหน้าหลัก
        document.querySelectorAll('.btn-back-text').forEach(el => {
          el.innerText = dict.btn_back;
        });

        // หากกำลังเปิดดูข้อมูลซุ้มอยู่ ให้ทำการอัปเดตภาษาทันที
        if (currentSelectedStall !== null) {
          const titlesDict = stallTitles[currentLang] || stallTitles['th'];
          const textStall = document.getElementById('text-stall-detail');
          if (textStall) textStall.innerText = titlesDict[currentSelectedStall];
          renderRecommendations(currentSelectedStall);
          renderPhoneContact(currentSelectedStall);
        }

        renderStallGrid();
      } catch (err) {
        console.error("Error inside switchLanguage:", err);
      }
    }

    // ─── ระบบซูมภาพแบบ Lightbox Modal ───
    function openImageModal(imgUrl, stallId, pageNum) {
      const modal = document.getElementById('image-modal');
      const modalImg = document.getElementById('modal-img');
      const caption = document.getElementById('img-modal-caption');
      
      if (modal && modalImg) {
        modal.style.display = 'flex';
        modalImg.src = imgUrl;
        modalImg.classList.remove('zoomed'); 
        if (caption) {
          const titlesDict = stallTitles[currentLang] || stallTitles['th'];
          const title = titlesDict[stallId] || '';
          
          let pageWord = 'หน้า';
          if (currentLang === 'en') pageWord = 'Page';
          else if (currentLang === 'ja') pageWord = 'ページ';
          
          caption.innerText = `${title} - ${pageWord} ${pageNum}`;
        }
      }
    }

    function closeImageModal() {
      const modal = document.getElementById('image-modal');
      if (modal) {
        modal.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const modalImg = document.getElementById('modal-img');
      if (modalImg) {
        modalImg.addEventListener('click', (e) => {
          e.stopPropagation(); 
          modalImg.classList.toggle('zoomed');
        });
      }
    });

    window.onload = function() {
      switchLanguage('th'); // ภาษาเริ่มต้นคือภาษาไทย
